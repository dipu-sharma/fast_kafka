global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fastapi-app'
    static_configs:
      - targets: 
        - 'accounts-service:8000'
        - 'payments-service:8000'
        - 'profiles-service:8000'
        - 'transactions-service:8000'
    metrics_path: /metrics
